<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f9f8f6" />
  <title>VivaLeve</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: oklch(0.982 0.006 85);
      --fg: oklch(0.24 0.018 258);
      --muted: oklch(0.54 0.018 258 / 0.45);
      --subtle: oklch(0.54 0.018 258 / 0.22);
      --border: oklch(0.54 0.018 258 / 0.10);
    }

    html, body {
      height: 100%;
      background-color: #f9f8f6;
      background-color: var(--bg);
      color: var(--fg);
      font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: calc(env(safe-area-inset-top) + 48px) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 48px) env(safe-area-inset-left);
    }

    .container {
      width: 100%;
      max-width: 340px;
      padding: 0 24px;
    }

    .mark {
      width: 28px;
      height: 28px;
      margin-bottom: 28px;
      opacity: 0.28;
    }

    .heading {
      font-size: 17px;
      font-weight: 450;
      letter-spacing: -0.025em;
      color: var(--fg);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .body {
      font-size: 14px;
      line-height: 1.65;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .divider {
      width: 24px;
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .note {
      font-size: 12px;
      line-height: 1.6;
      color: var(--subtle);
      letter-spacing: -0.008em;
    }

    .retry {
      display: inline-block;
      margin-top: 32px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: -0.01em;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .retry:active { opacity: 0.5; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      animation: fade-in 0.4s ease-out both;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="mark" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5" />
      <path d="M9 14.5c1.5 1.8 3.2 3 5 3s3.5-1.2 5-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      <circle cx="10.5" cy="11" r="1" fill="currentColor" />
      <circle cx="17.5" cy="11" r="1" fill="currentColor" />
    </svg>

    <p class="heading">Sem conexão no momento.</p>
    <p class="body">
      Seus registros continuam aqui, guardados com segurança.<br />
      O VivaLeve sincroniza quando a conexão voltar.
    </p>

    <div class="divider" aria-hidden="true"></div>

    <p class="note">
      Você pode continuar navegando pelas páginas que já foram carregadas antes.
    </p>

    <button class="retry" onclick="window.location.reload()">
      Tentar novamente
    </button>
  </div>
</body>
</html>
